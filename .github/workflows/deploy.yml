name: Desplegar ERP (VPS)

# Compila el ERP y sube los estáticos al droplet por rsync.
# Se dispara al hacer push a main (o manualmente).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (producción)
        run: npm run build

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || '22' }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Subir build al droplet
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.DEPLOY_PORT || '22' }}" \
            dist/qunuq-alpaca-erp/browser/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/qunuq/www/erp/"
